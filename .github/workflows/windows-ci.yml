name: Windows CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-publish:
    name: Test, build and publish
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore application and tests
        run: dotnet restore .\tests\DanteConfigEditorV3.Tests\DanteConfigEditorV3.Tests.csproj

      - name: Test
        run: >-
          dotnet test .\tests\DanteConfigEditorV3.Tests\DanteConfigEditorV3.Tests.csproj
          -c Release
          --no-restore
          --logger "trx;LogFileName=tests.trx"
          --results-directory .\TestResults

      - name: Build
        run: dotnet build .\DanteConfigEditorV3.csproj -c Release --no-restore

      - name: Publish win-x64
        run: >-
          dotnet publish .\DanteConfigEditorV3.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o .\artifacts\publish

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows
          path: .\TestResults\*.trx
          if-no-files-found: warn
          retention-days: 14

      - name: Upload published application
        uses: actions/upload-artifact@v7
        with:
          name: DanteConfigEditorV3-win-x64
          path: .\artifacts\publish
          if-no-files-found: error
          retention-days: 14
